name: Restore part3 and part4 sources

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/restore-part3-part4-sources.yml'
      - '.codex_restore/part3_part4_chunks/**'

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .codex_restore/part3_part4_chunks/chunk_{1..7}.b64 > /tmp/part3_part4.zip.b64
          base64 -d /tmp/part3_part4.zip.b64 > /tmp/part3_part4.zip
          actual_sha="$(sha256sum /tmp/part3_part4.zip | awk '{print toupper($1)}')"
          expected_sha="E7045D1C3F65696F033D382F601D1F9C89B718B2A862AF4DD64A7799CCEC941E"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "Archive SHA mismatch: $actual_sha"
            exit 1
          fi

      - name: Restore files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/part3_part4_sources
          mkdir -p /tmp/part3_part4_sources
          python3 - <<'PY'
          import zipfile
          zip_path = '/tmp/part3_part4.zip'
          out_dir = '/tmp/part3_part4_sources'
          with zipfile.ZipFile(zip_path) as zf:
              zf.extractall(out_dir)
          PY
          cp -R /tmp/part3_part4_sources/oop_kg_demo .

      - name: Verify restored source hashes
        shell: bash
        run: |
          set -euo pipefail
          check_hash() {
            local path="$1"
            local expected="$2"
            local actual
            actual="$(git hash-object "$path")"
            if [ "$actual" != "$expected" ]; then
              echo "Hash mismatch for $path: $actual"
              exit 1
            fi
          }
          check_hash oop_kg_demo/README.md d91d40572f1f0476c216793b8bd4bdc80176f6e8
          check_hash oop_kg_demo/part3_normalize/normalize_graph.py f2e6f0da246bfd26cb685ebef2664014e48ab8d3
          check_hash oop_kg_demo/part3_normalize/README.md 3090238adba08fab1139aadffba6a28783168914
          check_hash oop_kg_demo/part4_neo4j/import_to_neo4j.py 87dd3207dfb095a901f20ea83e98966658daaee0
          check_hash oop_kg_demo/part4_neo4j/README.md 861528d37309fe4c5b91bbefef5414e1230dd06a

      - name: Commit restored sources and cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .codex_restore
          rm -f .github/workflows/restore-part3-part4-sources.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A oop_kg_demo .codex_restore .github/workflows/restore-part3-part4-sources.yml
          git status --short
          git commit -m "Add OOP KG normalization and Neo4j import stages"
          git push
